name: Publish Release
on:
  push:
    branches:
      - main

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.INTEGRATIONS_FNM_BOT_TOKEN }}
          
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          scope: '@octopusdeploy'
          package-manager-cache: false  # never use caching in release builds
        if: ${{ steps.release.outputs.release_created }}        
      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}
      # --provenance signs a statement linking the tarball to this workflow
      # run via Sigstore + the OIDC token above, so consumers can verify it
      # was built from this repo/commit rather than a leaked npm token.
      - run: npm publish --access=public --provenance
        if: ${{ steps.release.outputs.release_created }}
